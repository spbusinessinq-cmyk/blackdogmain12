kind = "web"
previewPath = "/"
title = "BLACK DOG SECURITY"
version = "1.0.0"
id = "artifacts/black-dog-security"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20284

[services.development]
run = "pnpm --filter @workspace/black-dog-security run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/black-dog-security", "run", "build" ]
publicDir = "artifacts/black-dog-security/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20284"
BASE_PATH = "/"
