server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ----------------------------------------------------------------
    # API proxy — forward /api/* to the Node.js API container.
    # The Express app mounts all routes under /api/, so the prefix
    # must be preserved (proxy_pass with no path component does this).
    # ----------------------------------------------------------------
    location /api/ {
        proxy_pass         http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ----------------------------------------------------------------
    # Static asset caching — Vite fingerprints JS/CSS filenames so
    # long-lived caching is safe. Other asset types get 1-year TTL.
    # ----------------------------------------------------------------
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp)$ {
        expires            1y;
        add_header         Cache-Control "public, immutable";
        try_files          $uri =404;
    }

    # ----------------------------------------------------------------
    # SPA fallback — all non-file requests serve index.html so that
    # React / Wouter handles /commander/login, /commander/dashboard,
    # etc. on direct access and page refresh.
    # ----------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ----------------------------------------------------------------
    # Security headers
    # ----------------------------------------------------------------
    add_header X-Frame-Options       DENY                                always;
    add_header X-Content-Type-Options nosniff                            always;
    add_header Referrer-Policy        strict-origin-when-cross-origin    always;

    # Disable nginx version in error pages
    server_tokens off;
}
