# ==============================================================================
# BLACK DOG SECURITY — Portainer / Docker Compose Stack
# ==============================================================================
#
# Required environment variables (set in Portainer UI or .env file):
#
#   ADMIN_PASSWORD   Commander Center password          (no default — must set)
#   DB_PASSWORD      PostgreSQL password                (no default — must set)
#
# Optional environment variables:
#
#   ADMIN_USERNAME   Commander Center username          (default: rsr-admin)
#   DB_USER          PostgreSQL username                (default: blackdog)
#   HOST_PORT        Host port for the public site      (default: 80)
#
# First-time deployment — run the DB migration service before starting the
# full stack:
#
#   docker compose --profile migrate run --rm migrate
#
# Then start the full stack:
#
#   docker compose up -d
#
# ==============================================================================

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: bds_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       blackdog
      POSTGRES_USER:     ${DB_USER:-blackdog}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in Portainer environment or .env}
    volumes:
      - bds_pgdata:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${DB_USER:-blackdog} -d blackdog"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── API Server (Node.js / Express) ──────────────────────────────────────────
  api:
    build:
      context:    .
      dockerfile: Dockerfile.api
    image: bds-api:latest
    container_name: bds_api
    restart: unless-stopped
    environment:
      PORT:           "3001"
      NODE_ENV:       production
      DATABASE_URL:   postgres://${DB_USER:-blackdog}:${DB_PASSWORD}@db:5432/blackdog
      ADMIN_USERNAME: ${ADMIN_USERNAME:-rsr-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in Portainer environment or .env}
    depends_on:
      db:
        condition: service_healthy

  # ── Frontend (nginx / static SPA) ───────────────────────────────────────────
  frontend:
    build:
      context:    .
      dockerfile: Dockerfile.frontend
    image: bds-frontend:latest
    container_name: bds_frontend
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-80}:80"
    depends_on:
      - api

  # ── DB Migration (one-shot — run manually before first deploy) ───────────────
  # Usage:  docker compose --profile migrate run --rm migrate
  migrate:
    build:
      context:    .
      dockerfile: Dockerfile.api
      target:     builder           # reuse the builder stage — has drizzle-kit
    container_name: bds_migrate
    profiles:
      - migrate
    command: >
      sh -c "pnpm --filter @workspace/db push-force"
    environment:
      DATABASE_URL: postgres://${DB_USER:-blackdog}:${DB_PASSWORD}@db:5432/blackdog
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

volumes:
  bds_pgdata:
    name: bds_pgdata
